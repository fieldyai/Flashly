<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Fieldy Firmware Update">
    <title>Fieldy Update</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/mcumgr.css" rel="stylesheet">
    <link href="css/auto-update.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <meta name="theme-color" content="#563d7c">
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">
        <span>Fieldy Update</span>
    </a>
</nav>
<main role="main" class="container">

<div class="starter-template">
    <div class="content" id="auto-update-screen">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg login-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <i class="bi-arrow-up-circle display-1 text-primary" id="auto-header-icon"></i>
                            <h1 class="h3 mt-3 mb-1" id="auto-title">Firmware Update</h1>
                            <p class="text-muted" id="auto-subtitle">Update your Fieldy device</p>
                        </div>

                        <!-- Steps indicator -->
                        <div class="auto-steps mb-4" id="auto-steps">
                            <div class="auto-step" data-step="download">
                                <div class="auto-step-icon"><i class="bi-download"></i></div>
                                <div class="auto-step-label">Download</div>
                            </div>
                            <div class="auto-step-line"></div>
                            <div class="auto-step" data-step="connect">
                                <div class="auto-step-icon"><i class="bi-bluetooth"></i></div>
                                <div class="auto-step-label">Connect</div>
                            </div>
                            <div class="auto-step-line"></div>
                            <div class="auto-step" data-step="upload">
                                <div class="auto-step-icon"><i class="bi-upload"></i></div>
                                <div class="auto-step-label">Upload</div>
                            </div>
                            <div class="auto-step-line"></div>
                            <div class="auto-step" data-step="install">
                                <div class="auto-step-icon"><i class="bi-gear"></i></div>
                                <div class="auto-step-label">Install</div>
                            </div>
                            <div class="auto-step-line"></div>
                            <div class="auto-step" data-step="confirm">
                                <div class="auto-step-icon"><i class="bi-check-lg"></i></div>
                                <div class="auto-step-label">Confirm</div>
                            </div>
                        </div>

                        <!-- Progress bar -->
                        <div class="auto-progress-wrap mb-3" id="auto-progress-wrap" style="display: none;">
                            <div class="progress auto-progress-bar">
                                <div class="progress-bar" id="auto-progress-bar-inner" role="progressbar" style="width: 0%"></div>
                            </div>
                            <div class="text-center mt-1 small text-muted" id="auto-progress-text"></div>
                        </div>

                        <!-- Status message -->
                        <div class="text-center mb-4" id="auto-status">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            Preparing firmware...
                        </div>

                        <!-- Error display -->
                        <div class="alert alert-danger" id="auto-error" style="display: none;">
                            <i class="bi-exclamation-triangle-fill me-2"></i>
                            <span id="auto-error-message"></span>
                        </div>

                        <!-- Action button -->
                        <div class="d-grid" id="auto-action-wrap" style="display: none;">
                            <button id="auto-start-btn" class="btn btn-primary btn-lg">
                                <i class="bi-play-fill me-2"></i>Start Update
                            </button>
                        </div>

                        <!-- Success display -->
                        <div class="text-center" id="auto-success" style="display: none;">
                            <i class="bi-check-circle-fill display-3 text-success"></i>
                            <h4 class="mt-3 text-success">Update Complete!</h4>
                            <p class="text-muted">Your device has been updated successfully.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/cbor.js"></script>
<script src="js/mcumgr.js?v=6"></script>
<script src="js/auto-update.js"></script>
</main>
</body>
</html>
